<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>JK Metrics Lite Activity Samples</title>
  <style>
    :root {
      --bg: #101114;
      --panel: #191b20;
      --line: #30343d;
      --text: #f4f1e8;
      --muted: #9ca3af;
      --empty: #262a31;
      --low: #245a54;
      --mid: #3f8f6b;
      --high: #d3a336;
      --max: #f3d37b;
      --accent: #74b3ce;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Meiryo", sans-serif;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .year-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    button {
      min-width: 42px;
      height: 34px;
      border: 1px solid var(--line);
      background: #22262e;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    #yearLabel {
      min-width: 72px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    section {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .swatch,
    .day-cell,
    .hour-cell {
      width: 14px;
      height: 14px;
      background: var(--empty);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .daily-wrap {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .daily {
      display: grid;
      grid-template-rows: repeat(7, 14px);
      grid-auto-flow: column;
      grid-auto-columns: 14px;
      gap: 4px;
      width: max-content;
    }

    .hourly {
      display: grid;
      grid-template-columns: 44px repeat(24, minmax(22px, 1fr));
      gap: 5px;
      align-items: center;
    }

    .hour-label,
    .weekday-label {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .weekday-label {
      text-align: right;
      padding-right: 4px;
    }

    .hour-cell {
      width: 100%;
      min-width: 22px;
      height: 22px;
    }

    .monthly {
      display: grid;
      gap: 10px;
    }

    .month-row {
      display: grid;
      grid-template-columns: 42px 1fr 130px;
      gap: 12px;
      align-items: center;
    }

    .bar-track {
      height: 18px;
      background: var(--empty);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--mid), var(--high));
    }

    .value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .summary strong {
      color: var(--text);
      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <h1>Activity Sample Dashboard</h1>
      <div class="sub">Prototype view generated from activity_samples.tsv</div>
    </div>
    <div class="year-controls">
      <button id="prevYear" title="Previous year">&lt;</button>
      <div id="yearLabel">----</div>
      <button id="nextYear" title="Next year">&gt;</button>
    </div>
  </header>

  <div class="summary">
    <div>Total playtime<br><strong id="totalPlaytime">-</strong></div>
    <div>Total jumps<br><strong id="totalJumps">-</strong></div>
    <div>Most active day<br><strong id="bestDay">-</strong></div>
    <div>Most active hour<br><strong id="bestHour">-</strong></div>
  </div>

  <div class="grid">
    <section>
      <h2>Daily Activity Heatmap</h2>
      <div class="daily-wrap">
        <div id="daily" class="daily"></div>
      </div>
      <div class="legend">Less <span class="swatch level-0"></span><span class="swatch level-1"></span><span class="swatch level-2"></span><span class="swatch level-3"></span><span class="swatch level-4"></span> More</div>
    </section>

    <section>
      <h2>Hourly Activity Heatmap</h2>
      <div id="hourly" class="hourly"></div>
    </section>

    <section>
      <h2>Monthly Jumps</h2>
      <div id="monthly" class="monthly"></div>
    </section>
  </div>
</div>

<script>
const sampleFilePath = "activity_samples.tsv";
const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

let allSamples = [];
let selectedYear = null;

function parseTsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const header = lines.shift().split("\t");

  return lines.map(line => {
    const cols = line.split("\t");
    const row = {};

    header.forEach((key, index) => {
      row[key] = cols[index] || "";
    });

    return {
      timestamp: row.timestamp,
      date: row.date,
      year: Number(row.year),
      month: Number(row.month),
      weekday: row.weekday,
      hour: Number(row.hour),
      minute: Number(row.minute),
      totalFrames: Number(row.total_frames),
      totalJumps: Number(row.total_jumps)
    };
  }).filter(row =>
    row.timestamp &&
    Number.isFinite(row.year) &&
    Number.isFinite(row.month) &&
    Number.isFinite(row.hour) &&
    Number.isFinite(row.totalFrames) &&
    Number.isFinite(row.totalJumps)
  );
}

function buildDeltas(samples) {
  const sorted = samples.slice().sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  const deltas = [];

  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1];
    const current = sorted[i];
    const frameDelta = Math.max(0, current.totalFrames - prev.totalFrames);
    const jumpDelta = Math.max(0, current.totalJumps - prev.totalJumps);

    if (frameDelta === 0 && jumpDelta === 0) {
      continue;
    }

    deltas.push({
      timestamp: current.timestamp,
      date: current.date,
      year: current.year,
      month: current.month,
      weekday: current.weekday,
      hour: current.hour,
      frames: frameDelta,
      jumps: jumpDelta
    });
  }

  return deltas;
}

function addToMap(map, key, frames, jumps) {
  if (!map.has(key)) {
    map.set(key, { frames: 0, jumps: 0 });
  }

  const item = map.get(key);
  item.frames += frames;
  item.jumps += jumps;
}

function level(value, max) {
  if (value <= 0 || max <= 0) return 0;
  const ratio = value / max;
  if (ratio < 0.25) return 1;
  if (ratio < 0.50) return 2;
  if (ratio < 0.75) return 3;
  return 4;
}

function colorForLevel(lv) {
  return ["var(--empty)", "var(--low)", "var(--mid)", "var(--high)", "var(--max)"][lv] || "var(--empty)";
}

function formatFrames(frames) {
  const seconds = Math.round(frames / 60);
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);

  if (hours > 0) {
    return `${hours}h ${String(minutes).padStart(2, "0")}m`;
  }

  return `${minutes}m`;
}

function formatNumber(value) {
  return Math.round(value).toLocaleString("en-US");
}

function daysInYear(year) {
  const start = new Date(year, 0, 1);
  const end = new Date(year + 1, 0, 1);
  const days = [];

  for (let date = new Date(start); date < end; date.setDate(date.getDate() + 1)) {
    days.push(new Date(date));
  }

  return days;
}

function dateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function renderDaily(dailyMap, year) {
  const root = document.getElementById("daily");
  root.innerHTML = "";

  const days = daysInYear(year);
  const maxFrames = Math.max(0, ...Array.from(dailyMap.values()).map(v => v.frames));

  for (const day of days) {
    const key = dateKey(day);
    const data = dailyMap.get(key) || { frames: 0, jumps: 0 };
    const cell = document.createElement("div");
    const lv = level(data.frames, maxFrames);

    cell.className = "day-cell";
    cell.style.background = colorForLevel(lv);
    cell.title = `${key} / ${formatFrames(data.frames)} / ${formatNumber(data.jumps)} jumps`;
    root.appendChild(cell);
  }
}

function renderHourly(hourlyMap) {
  const root = document.getElementById("hourly");
  root.innerHTML = "";

  root.appendChild(document.createElement("div"));

  for (let hour = 0; hour < 24; hour++) {
    const label = document.createElement("div");
    label.className = "hour-label";
    label.textContent = String(hour).padStart(2, "0");
    root.appendChild(label);
  }

  const maxFrames = Math.max(0, ...Array.from(hourlyMap.values()).map(v => v.frames));

  for (const weekday of weekdays) {
    const rowLabel = document.createElement("div");
    rowLabel.className = "weekday-label";
    rowLabel.textContent = weekday;
    root.appendChild(rowLabel);

    for (let hour = 0; hour < 24; hour++) {
      const key = `${weekday}-${hour}`;
      const data = hourlyMap.get(key) || { frames: 0, jumps: 0 };
      const cell = document.createElement("div");
      const lv = level(data.frames, maxFrames);

      cell.className = "hour-cell";
      cell.style.background = colorForLevel(lv);
      cell.title = `${weekday} ${String(hour).padStart(2, "0")}:00 / ${formatFrames(data.frames)} / ${formatNumber(data.jumps)} jumps`;
      root.appendChild(cell);
    }
  }
}

function renderMonthly(monthlyMap) {
  const root = document.getElementById("monthly");
  root.innerHTML = "";

  const maxJumps = Math.max(0, ...Array.from(monthlyMap.values()).map(v => v.jumps));

  for (let month = 1; month <= 12; month++) {
    const data = monthlyMap.get(month) || { frames: 0, jumps: 0 };
    const row = document.createElement("div");
    const label = document.createElement("div");
    const track = document.createElement("div");
    const bar = document.createElement("div");
    const value = document.createElement("div");

    row.className = "month-row";
    label.textContent = months[month - 1];
    track.className = "bar-track";
    bar.className = "bar";
    bar.style.width = maxJumps > 0 ? `${Math.max(2, data.jumps / maxJumps * 100)}%` : "0";
    value.className = "value";
    value.textContent = `${formatNumber(data.jumps)} jumps`;

    track.appendChild(bar);
    row.appendChild(label);
    row.appendChild(track);
    row.appendChild(value);
    root.appendChild(row);
  }
}

function renderSummary(dailyMap, hourlyMap, deltas) {
  const totalFrames = deltas.reduce((sum, item) => sum + item.frames, 0);
  const totalJumps = deltas.reduce((sum, item) => sum + item.jumps, 0);

  let bestDay = "-";
  let bestDayFrames = 0;

  for (const [key, value] of dailyMap.entries()) {
    if (value.frames > bestDayFrames) {
      bestDay = key;
      bestDayFrames = value.frames;
    }
  }

  let bestHour = "-";
  let bestHourFrames = 0;

  for (const [key, value] of hourlyMap.entries()) {
    if (value.frames > bestHourFrames) {
      bestHour = key.replace("-", " ");
      bestHourFrames = value.frames;
    }
  }

  document.getElementById("totalPlaytime").textContent = formatFrames(totalFrames);
  document.getElementById("totalJumps").textContent = formatNumber(totalJumps);
  document.getElementById("bestDay").textContent = bestDay;
  document.getElementById("bestHour").textContent = bestHour;
}

function renderYear(year) {
  selectedYear = year;
  document.getElementById("yearLabel").textContent = year;

  const deltas = buildDeltas(allSamples).filter(item => item.year === year);
  const dailyMap = new Map();
  const hourlyMap = new Map();
  const monthlyMap = new Map();

  for (const item of deltas) {
    addToMap(dailyMap, item.date, item.frames, item.jumps);
    addToMap(hourlyMap, `${item.weekday}-${item.hour}`, item.frames, item.jumps);
    addToMap(monthlyMap, item.month, item.frames, item.jumps);
  }

  renderSummary(dailyMap, hourlyMap, deltas);
  renderDaily(dailyMap, year);
  renderHourly(hourlyMap);
  renderMonthly(monthlyMap);
}

function availableYears() {
  return Array.from(new Set(allSamples.map(item => item.year))).sort();
}

function moveYear(offset) {
  const years = availableYears();
  const index = years.indexOf(selectedYear);
  const nextIndex = Math.min(years.length - 1, Math.max(0, index + offset));
  renderYear(years[nextIndex]);
}

async function boot() {
  const response = await fetch(sampleFilePath + "?t=" + Date.now());
  const text = await response.text();
  allSamples = parseTsv(text);

  const years = availableYears();

  if (years.length === 0) {
    return;
  }

  renderYear(years[0]);
}

document.getElementById("prevYear").addEventListener("click", () => moveYear(-1));
document.getElementById("nextYear").addEventListener("click", () => moveYear(1));

boot().catch(error => {
  document.querySelector(".sub").textContent = "Failed to load activity_samples.tsv: " + error.message;
});
</script>
</body>
</html>
