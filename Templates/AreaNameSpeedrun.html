<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: transparent;
      color: #fff;
      font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
      font-size: 24px;
      line-height: 1.35;
    }

    table {
      border-collapse: collapse;
      table-layout: fixed;
      background: rgba(0, 0, 0, 0.75);
    }

    th, td {
      padding: 4px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    th.area,
    td.area {
      width: 25ch;
      max-width: 25ch;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    th.time,
    td.time {
      width: 15ch;
      white-space: pre;
    }

    .current td {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th class="area">Area</th>
      <th class="time">First Reach</th>
      <th class="time">Stay Time</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
const areaFilePath = "area_bar_graph.tsv";

function escapeHtml(value) {
  return value
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

async function updateAreaTable() {
  try {
    const res = await fetch(areaFilePath + "?t=" + Date.now());
    const text = await res.text();

    const lines = text.trim().split(/\r?\n/);
    const tbody = document.getElementById("rows");

    if (lines.length <= 1) {
      tbody.innerHTML = "";
      return;
    }

    const html = lines.slice(1).map(line => {
      const cols = line.split("\t");
      const areaName = cols[1] || "";
      const isCurrent = cols[5] === "1";
      const firstReach = cols[6] || "";
      const stayTime = cols[7] || "";

      return "<tr" + (isCurrent ? " class='current'" : "") + ">" +
        "<td class='area'>" + escapeHtml(areaName) + "</td>" +
        "<td class='time'>" + escapeHtml(firstReach) + "</td>" +
        "<td class='time'>" + escapeHtml(stayTime) + (isCurrent ? " &lt;" : "") + "</td>" +
      "</tr>";
    }).join("");

    tbody.innerHTML = html;
  } catch (e) {
    document.getElementById("rows").innerHTML =
      "<tr><td colspan='3'>Failed to load area_bar_graph.tsv</td></tr>";
  }
}

updateAreaTable();
setInterval(updateAreaTable, 500);
</script>
</body>
</html>
